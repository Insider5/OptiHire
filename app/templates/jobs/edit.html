{% extends 'base.html' %}

{% block title %}Edit Job - OptiHire{% endblock %}

{% block content %}
<div class="bg-gradient-to-br from-blue-50 via-white to-purple-50 py-16 min-h-screen">
    <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
        <!-- Header -->
        <div class="mb-12">
            <a href="{{ url_for('jobs.view_job', job_id=job.id) }}"
                class="text-primary-600 hover:text-primary-700 font-medium mb-4 inline-flex items-center">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                </svg>
                Back to Job
            </a>
            <h1 class="text-4xl font-extrabold text-gray-900 mt-4">
                Edit <span class="text-transparent bg-clip-text bg-gradient-to-r from-primary-600 to-purple-600">Job
                    Posting</span>
            </h1>
        </div>

        <!-- Form -->
        <div class="bg-white rounded-3xl shadow-2xl p-8 md:p-12">
            <form method="POST" class="space-y-8">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <!-- Basic Information -->
                <div>
                    <h2 class="text-2xl font-bold text-gray-900 mb-6">Basic Information</h2>
                    <div class="grid md:grid-cols-2 gap-6">
                        <div class="md:col-span-2">
                            <label for="title" class="block text-sm font-bold text-gray-900 mb-2">
                                Job Title *
                            </label>
                            <input type="text" name="title" id="title" value="{{ job.title }}" required
                                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-transparent">
                        </div>

                        <div>
                            <label for="company" class="block text-sm font-bold text-gray-900 mb-2">
                                Company Name *
                            </label>
                            <input type="text" name="company" id="company" value="{{ job.company }}" required
                                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-transparent">
                        </div>

                        <div>
                            <label for="location" class="block text-sm font-bold text-gray-900 mb-2">
                                Location
                            </label>
                            <input type="text" name="location" id="location" value="{{ job.location or '' }}"
                                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-transparent">
                        </div>

                        <div>
                            <label for="job_type" class="block text-sm font-bold text-gray-900 mb-2">
                                Job Type
                            </label>
                            <select name="job_type" id="job_type"
                                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-transparent">
                                <option value="">Select type...</option>
                                <option value="Full-time" {% if job.job_type=='Full-time' %}selected{% endif %}>
                                    Full-time</option>
                                <option value="Part-time" {% if job.job_type=='Part-time' %}selected{% endif %}>
                                    Part-time</option>
                                <option value="Contract" {% if job.job_type=='Contract' %}selected{% endif %}>Contract
                                </option>
                                <option value="Internship" {% if job.job_type=='Internship' %}selected{% endif %}>
                                    Internship</option>
                                <option value="Remote" {% if job.job_type=='Remote' %}selected{% endif %}>Remote
                                </option>
                            </select>
                        </div>

                        <div>
                            <label for="experience_level" class="block text-sm font-bold text-gray-900 mb-2">
                                Experience Level
                            </label>
                            <select name="experience_level" id="experience_level"
                                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-transparent">
                                <option value="">Select level...</option>
                                <option value="Entry Level" {% if job.experience_level=='Entry Level' %}selected{% endif
                                    %}>Entry Level (0-2 years)</option>
                                <option value="Mid Level" {% if job.experience_level=='Mid Level' %}selected{% endif %}>
                                    Mid Level (2-5 years)</option>
                                <option value="Senior Level" {% if job.experience_level=='Senior Level' %}selected{%
                                    endif %}>Senior Level (5-10 years)</option>
                                <option value="Lead/Principal" {% if job.experience_level=='Lead/Principal' %}selected{%
                                    endif %}>Lead/Principal (10+ years)</option>
                            </select>
                        </div>

                        <div class="md:col-span-2">
                            <label for="salary_range" class="block text-sm font-bold text-gray-900 mb-2">
                                Salary Range
                            </label>
                            <input type="text" name="salary_range" id="salary_range"
                                value="{{ job.salary_range or '' }}"
                                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-transparent">
                        </div>
                    </div>
                </div>

                <!-- Job Details -->
                <div>
                    <h2 class="text-2xl font-bold text-gray-900 mb-6">Job Details</h2>

                    <div class="space-y-6">
                        <div>
                            <label for="description" class="block text-sm font-bold text-gray-900 mb-2">
                                Job Description *
                            </label>
                            <textarea name="description" id="description" rows="8" required
                                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-transparent">{{ job.description }}</textarea>
                        </div>

                        <div>
                            <label for="requirements" class="block text-sm font-bold text-gray-900 mb-2">
                                Requirements & Qualifications *
                            </label>
                            <textarea name="requirements" id="requirements" rows="8" required
                                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-transparent">{{ job.requirements }}</textarea>
                        </div>

                        <div>
                            <label for="skills_required" class="block text-sm font-bold text-gray-900 mb-2">
                                Required Skills & Technologies
                            </label>
                            <input type="text" name="skills_required" id="skills_required" value="{{ skills_str }}"
                                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-transparent"
                                placeholder="e.g., Python, React, AWS (comma-separated)">
                            <p class="text-sm text-gray-500 mt-2">Enter skills separated by commas</p>
                        </div>
                    </div>
                </div>

                <!-- Submit Buttons -->
                <div class="flex gap-4 pt-6">
                    <a href="{{ url_for('jobs.view_job', job_id=job.id) }}"
                        class="px-8 py-4 border-2 border-gray-300 text-gray-700 rounded-xl font-bold text-lg hover:border-primary-500 hover:text-primary-600">
                        Cancel
                    </a>
                    <button type="submit"
                        class="flex-1 bg-gradient-to-r from-primary-600 to-purple-600 text-white px-8 py-4 rounded-xl font-bold text-lg hover:from-primary-700 hover:to-purple-700 hover-lift shadow-lg">
                        Update Job
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
