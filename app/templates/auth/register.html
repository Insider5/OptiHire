{% extends "base.html" %}

{% block title %}Register - OptiHire{% endblock %}

{% block content %}
<div
    class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 bg-gradient-to-br from-primary-50 to-accent-50">
    <div class="max-w-md w-full">
        <div class="bg-white rounded-2xl shadow-2xl p-8">
            <div class="text-center mb-8">
                <div class="w-16 h-16 gradient-primary rounded-xl flex items-center justify-center mx-auto mb-4">
                    <span class="text-white font-bold text-2xl">O</span>
                </div>
                <h2 class="text-3xl font-bold text-gray-900">Create Account</h2>
                <p class="text-gray-600 mt-2">Join OptiHire today</p>
            </div>

            <form method="POST" action="{{ url_for('auth.register') }}" class="space-y-5">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div>
                    <label for="full_name" class="block text-sm font-medium text-gray-700 mb-2">Full Name</label>
                    <input type="text" id="full_name" name="full_name" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-transparent transition duration-200"
                        placeholder="John Doe">
                </div>

                <div>
                    <label for="username" class="block text-sm font-medium text-gray-700 mb-2">Username</label>
                    <input type="text" id="username" name="username" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-transparent transition duration-200"
                        placeholder="johndoe">
                </div>

                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-2">Email Address</label>
                    <input type="email" id="email" name="email" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-transparent transition duration-200"
                        placeholder="you@example.com">
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                    <input type="password" id="password" name="password" required minlength="8"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-transparent transition duration-200"
                        placeholder="••••••••">
                    <p class="text-xs text-gray-500 mt-1">At least 8 characters and 1 number</p>
                </div>

                <div>
                    <label for="confirm_password" class="block text-sm font-medium text-gray-700 mb-2">Confirm
                        Password</label>
                    <input type="password" id="confirm_password" name="confirm_password" required minlength="8"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-transparent transition duration-200"
                        placeholder="••••••••">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-3">I am a:</label>
                    <div class="grid grid-cols-2 gap-4">
                        <label class="cursor-pointer">
                            <input type="radio" name="user_type" value="candidate" {% if
                                request.args.get('type')=='candidate' %}checked{% elif not request.args.get('type')
                                %}checked{% endif %} class="peer hidden">
                            <div
                                class="border-2 border-gray-300 peer-checked:border-primary-600 peer-checked:bg-primary-50 rounded-lg p-4 text-center transition duration-200">
                                <div class="text-3xl mb-2">👨‍💼</div>
                                <div class="font-semibold text-gray-900">Candidate</div>
                                <div class="text-xs text-gray-600">Looking for jobs</div>
                            </div>
                        </label>

                        <label class="cursor-pointer">
                            <input type="radio" name="user_type" value="recruiter" {% if
                                request.args.get('type')=='recruiter' %}checked{% endif %} class="peer hidden">
                            <div
                                class="border-2 border-gray-300 peer-checked:border-primary-600 peer-checked:bg-primary-50 rounded-lg p-4 text-center transition duration-200">
                                <div class="text-3xl mb-2">🏢</div>
                                <div class="font-semibold text-gray-900">Recruiter</div>
                                <div class="text-xs text-gray-600">Hiring talent</div>
                            </div>
                        </label>
                    </div>
                </div>

                <button type="submit"
                    class="w-full gradient-primary text-white py-3 rounded-lg font-semibold hover:opacity-90 transition duration-200 shadow-lg hover:shadow-xl">
                    Create Account
                </button>
            </form>

            <div class="mt-6 text-center">
                <p class="text-sm text-gray-600">
                    Already have an account?
                    <a href="{{ url_for('auth.login') }}"
                        class="text-primary-600 hover:text-primary-700 font-semibold">Sign in</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
